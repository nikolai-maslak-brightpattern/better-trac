name: Release

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      exists: ${{ steps.tag_check.outputs.exists }}
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check tag exists
        id: tag_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.pkg.outputs.version }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    needs: check
    if: needs.check.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: yarn install --frozen-lockfile

      - run: yarn build

      - name: Zip Chrome dist
        run: zip -r better-trac-chrome-${{ needs.check.outputs.version }}.zip dist/

      - run: yarn build:firefox

      - name: Zip Firefox dist
        run: zip -r better-trac-firefox-${{ needs.check.outputs.version }}.zip dist/

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.check.outputs.version }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --latest \
            better-trac-chrome-${{ needs.check.outputs.version }}.zip \
            better-trac-firefox-${{ needs.check.outputs.version }}.zip
